<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería Escolar Pro</title>
    <style>
        :root { --cafe: #4e342e; --crema: #f4f1ea; --accent: #795548; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--crema); color: var(--cafe); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1, h3 { text-align: center; margin-bottom: 10px; }
        
        .balance-card { text-align: center; font-size: 1.8em; font-weight: bold; background: var(--cafe); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        
        /* Animación de la Taza */
        .cafe-container { text-align: center; margin: 30px 0; }
        .taza-wrapper { position: relative; width: 120px; height: 90px; margin: 0 auto; border: 5px solid var(--cafe); border-radius: 5px 5px 50px 50px; background: #fff; overflow: hidden; }
        .taza-asa { position: absolute; right: -20px; top: 20px; width: 30px; height: 40px; border: 5px solid var(--cafe); border-radius: 50%; z-index: -1; }
        .liquido { position: absolute; bottom: 0; width: 100%; background: #6f4e37; transition: height 0.8s ease-in-out; }
        
        input { width: calc(100% - 22px); padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-aporte { background-color: #4caf50; color: white; }
        .btn-gasto { background-color: #e53935; color: white; }
        .btn-wa { background-color: #25d366; color: white; }
        .btn-print { background-color: #546e7a; color: white; }
        
        .historial { margin-top: 20px; max-height: 200px; overflow-y: auto; font-size: 0.9em; border-top: 1px solid #ddd; padding-top: 10px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h1>☕ Cafetería Escolar</h1>
        <div class="balance-card">Saldo: $<span id="saldo-total">0</span></div>

        <div class="cafe-container">
            <div style="position: relative; width: fit-content; margin: auto;">
                <div class="taza-wrapper">
                    <div id="cafe-nivel" class="liquido" style="height: 0%;"></div>
                </div>
                <div class="taza-asa"></div>
            </div>
            <p><small>Nivel de Presupuesto</small></p>
        </div>

        <h3>➕ Registrar Aporte</h3>
        <input type="text" id="prof-nombre" placeholder="Nombre (Opcional)">
        <input type="tel" id="prof-tel" placeholder="Número de WhatsApp (Ej: 57300...)">
        <input type="number" id="prof-monto" placeholder="Monto del Aporte $">
        <button class="btn-aporte" onclick="agregarAporte()">Registrar Aporte</button>

        <h3>➖ Registrar Gasto</h3>
        <input type="text" id="gasto-nombre" placeholder="Concepto del gasto (Azúcar, Café...)">
        <input type="number" id="gasto-monto" placeholder="Monto del Gasto $">
        <button class="btn-gasto" onclick="agregarGasto()">Registrar Gasto</button>

        <hr>
        <button class="btn-wa" onclick="enviarReporteGeneral()">📲 WhatsApp General</button>
        <button class="btn-print" onclick="window.print()">🖨️ Imprimir Balance</button>
        <button onclick="limpiarDatos()" style="background:none; color: grey; font-size: 11px;">Borrar todos los datos</button>
    </div>

    <div id="seccion-impresion">
        <h3>Historial de Movimientos</h3>
        <div id="lista-movimientos" class="historial"></div>
    </div>
</div>

<script>
    let datos = JSON.parse(localStorage.getItem('cafeteria_datos')) || { ingresos: 0, gastos: 0, historial: [] };

    function guardar() {
        localStorage.setItem('cafeteria_datos', JSON.stringify(datos));
        actualizarInterfaz();
    }

    function actualizarInterfaz() {
        let saldo = datos.ingresos - datos.gastos;
        document.getElementById('saldo-total').innerText = saldo.toLocaleString();
        
        // Animación taza
        let porcentaje = (datos.ingresos > 0) ? (saldo / datos.ingresos) * 100 : 0;
        document.getElementById('cafe-nivel').style.height = Math.max(0, Math.min(porcentaje, 100)) + "%";

        // Lista de movimientos
        const lista = document.getElementById('lista-movimientos');
        lista.innerHTML = datos.historial.map(m => `<div><strong>${m.tipo}:</strong> ${m.nombre} - $${m.monto}</div>`).reverse().join('');
    }

    function agregarAporte() {
        let nombre = document.getElementById('prof-nombre').value || "Anónimo";
        let tel = document.getElementById('prof-tel').value || "";
        let monto = parseFloat(document.getElementById('prof-monto').value);

        if (monto > 0) {
            datos.ingresos += monto;
            datos.historial.push({ tipo: 'Aporte', nombre: nombre, monto: monto, tel: tel });
            
            // Si tiene teléfono, ofrecer enviar recibo individual
            if(tel !== "") {
                if(confirm("¿Quieres enviar comprobante por WhatsApp a este profesor?")) {
                    let msg = `✅ *Recibo Cafetería*%0AHola ${nombre}, recibimos tu aporte de $${monto}. ¡Gracias!`;
                    window.open(`https://wa.me/${tel}?text=${msg}`);
                }
            }
            
            limpiarInputs(['prof-nombre', 'prof-tel', 'prof-monto']);
            guardar();
        }
    }

    function agregarGasto() {
        let concepto = document.getElementById('gasto-nombre').value || "Gasto vario";
        let monto = parseFloat(document.getElementById('gasto-monto').value);

        if (monto > 0) {
            datos.gastos += monto;
            datos.historial.push({ tipo: 'Gasto', nombre: concepto, monto: monto });
            limpiarInputs(['gasto-nombre', 'gasto-monto']);
            guardar();
        }
    }

    function enviarReporteGeneral() {
        let saldo = datos.ingresos - datos.gastos;
        let mensaje = `☕ *BALANCE GENERAL CAFETERÍA*%0A--------------------------%0A➕ Total Aportes: $${datos.ingresos}%0A➖ Total Gastos: $${datos.gastos}%0A💰 *Saldo Disponible: $${saldo}*%0A--------------------------%0A_Reporte generado automáticamente._`;
        window.open(`https://wa.me/?text=${mensaje}`);
    }

    function limpiarInputs(ids) {
        ids.forEach(id => document.getElementById(id).value = '');
    }

    function limpiarDatos() {
        if(confirm("¿Estás seguro de borrar todas las cuentas?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // Cargar datos al iniciar
    actualizarInterfaz();
</script>

</body>
</html>
