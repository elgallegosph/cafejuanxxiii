<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería Escolar - Control</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f1ea; padding: 20px; color: #4e342e; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #6d4c41; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #795548; color: white; cursor: pointer; font-weight: bold; }
        .balance-card { text-align: center; font-size: 1.5em; background: #efebe9; padding: 15px; border-radius: 10px; }
        
        /* Animación de la Greca y Taza */
        .cafe-container { text-align: center; margin: 20px 0; position: relative; }
        .taza { width: 100px; height: 80px; background: #fff; border: 4px solid #4e342e; border-radius: 0 0 40px 40px; margin: 20px auto; position: relative; overflow: hidden; }
        .liquido { background: #4e342e; width: 100%; position: absolute; bottom: 0; transition: height 1s ease-in-out; }
    </style>
</head>
<body>

<div class="container">
    <h1>☕ Control Cafetería</h1>
    
    <div class="balance-card">
        Saldo Actual: $<span id="saldo-total">0</span>
    </div>

    <div class="cafe-container">
        <div class="taza">
            <div id="cafe-nivel" class="liquido" style="height: 0%;"></div>
        </div>
        <p>Nivel de Presupuesto</p>
    </div>

    <h3>➕ Registrar Aporte (Profesor)</h3>
    <input type="text" id="prof-nombre" placeholder="Nombre del Profesor">
    <input type="number" id="prof-monto" placeholder="Monto $">
    <button onclick="agregarAporte()">Agregar Aporte</button>

    <h3>➖ Registrar Gasto</h3>
    <input type="text" id="gasto-nombre" placeholder="¿En qué se gastó?">
    <input type="number" id="gasto-monto" placeholder="Monto $">
    <button onclick="agregarGasto()" style="background-color: #d32f2f;">Registrar Gasto</button>

    <hr>
    <button onclick="enviarWhatsApp()">📲 Enviar Balance por WhatsApp</button>
    <button onclick="window.print()" style="background-color: #455a64;">🖨️ Imprimir Reporte</button>
</div>

<script>
    let ingresos = 0;
    let gastos = 0;

    function actualizarInterfaz() {
        let saldo = ingresos - gastos;
        document.getElementById('saldo-total').innerText = saldo.toLocaleString();
        
        // Calcular porcentaje para la taza (máximo 100%)
        let porcentaje = (ingresos > 0) ? (saldo / ingresos) * 100 : 0;
        document.getElementById('cafe-nivel').style.height = Math.max(0, Math.min(porcentaje, 100)) + "%";
    }

    function agregarAporte() {
        let monto = parseFloat(document.getElementById('prof-monto').value);
        if (monto > 0) {
            ingresos += monto;
            actualizarInterfaz();
            document.getElementById('prof-monto').value = '';
        }
    }

    function agregarGasto() {
        let monto = parseFloat(document.getElementById('gasto-monto').value);
        if (monto > 0) {
            gastos += monto;
            actualizarInterfaz();
            document.getElementById('gasto-monto').value = '';
        }
    }

    function enviarWhatsApp() {
        let saldo = ingresos - gastos;
        let mensaje = `☕ *Reporte Cafetería*%0A------------------%0ATotal Ingresos: $${ingresos}%0ATotal Gastos: $${gastos}%0A*Saldo Disponible: $${saldo}*`;
        window.open(`https://wa.me/?text=${mensaje}`);
    }
</script>

</body>
</html>
