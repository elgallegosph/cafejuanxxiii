<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería Escolar - Reporte Maestro</title>
    <style>
        :root { --cafe: #4e342e; --crema: #f4f1ea; --verde: #4caf50; --rojo: #e53935; --azul: #2196f3; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--crema); color: var(--cafe); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1, h3 { text-align: center; margin-bottom: 10px; }
        
        .selector-mes { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; background: #eee; padding: 10px; border-radius: 10px; }
        .balance-card { text-align: center; font-size: 1.8em; font-weight: bold; background: var(--cafe); color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        
        /* Gráficos de Tazas */
        .graficos-tazas { display: flex; justify-content: space-around; align-items: flex-end; margin: 30px 0; gap: 10px; }
        .taza-col { text-align: center; flex: 1; }
        .taza-wrapper { position: relative; width: 70px; height: 55px; margin: 0 auto; border: 4px solid var(--cafe); border-radius: 5px 5px 30px 30px; background: #fff; overflow: hidden; }
        .taza-asa { position: absolute; right: -12px; top: 12px; width: 18px; height: 25px; border: 4px solid var(--cafe); border-radius: 50%; z-index: -1; }
        .liquido { position: absolute; bottom: 0; width: 100%; transition: height 0.8s ease-in-out; }
        .val-taza { font-size: 11px; font-weight: bold; margin-top: 5px; display: block; }
        
        .liq-ingreso { background: var(--verde) !important; -webkit-print-color-adjust: exact; }
        .liq-gasto { background: var(--rojo) !important; -webkit-print-color-adjust: exact; }
        .liq-saldo { background: #6f4e37 !important; -webkit-print-color-adjust: exact; }

        input, select { width: calc(100% - 22px); padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 15px; }
        .btn-aporte { background-color: var(--verde); color: white; }
        .btn-gasto { background-color: var(--rojo); color: white; }
        .btn-wa { background-color: #25d366; color: white; }
        .btn-print { background-color: #546e7a; color: white; }
        .btn-total { background-color: var(--azul); color: white; }
        
        .historial { margin-top: 20px; max-height: 250px; overflow-y: auto; font-size: 0.9em; border-top: 1px solid #ddd; padding-top: 10px; }
        .item-mov { padding: 6px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .fecha-mov { font-size: 0.75em; color: #777; display: block; }
        
        @media print { 
            .no-print { display: none !important; } 
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; border: none; }
            .historial { max-height: none; overflow: visible; }
            .taza-wrapper { border: 2px solid #000; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h1>☕ Cafetería Escolar</h1>
        <div class="selector-mes">
            <select id="mes-filtro" onchange="actualizarInterfaz()"></select>
        </div>
        <div class="balance-card">Saldo: $<span id="saldo-total">0</span></div>
    </div>

    <div id="seccion-reporte">
        <div class="graficos-tazas">
            <div class="taza-col">
                <div style="position: relative; width: fit-content; margin: auto;">
                    <div class="taza-wrapper"><div id="taza-ingresos" class="liquido liq-ingreso"></div></div>
                    <div class="taza-asa"></div>
                </div>
                <p><small>Ingresos</small><br><span class="val-taza" id="txt-ingresos">$0</span></p>
            </div>
            <div class="taza-col">
                <div style="position: relative; width: fit-content; margin: auto;">
                    <div class="taza-wrapper"><div id="taza-gastos" class="liquido liq-gasto"></div></div>
                    <div class="taza-asa"></div>
                </div>
                <p><small>Gastos</small><br><span class="val-taza" id="txt-gastos">$0</span></p>
            </div>
            <div class="taza-col">
                <div style="position: relative; width: fit-content; margin: auto;">
                    <div class="taza-wrapper"><div id="taza-saldo" class="liquido liq-saldo"></div></div>
                    <div class="taza-asa"></div>
                </div>
                <p><strong>Saldo</strong><br><span class="val-taza" id="txt-saldo">$0</span></p>
            </div>
        </div>

        <h3 id="titulo-historial">Movimientos del Mes</h3>
        <div id="lista-movimientos" class="historial"></div>
    </div>

    <div class="no-print">
        <hr>
        <h3>➕ Registrar Aporte</h3>
        <input type="text" id="prof-nombre" placeholder="Nombre del Profesor">
        <input type="tel" id="prof-tel" placeholder="WhatsApp (Ej: 57300...)">
        <input type="number" id="prof-monto" placeholder="Monto $">
        <button class="btn-aporte" onclick="agregarRegistro('ingreso')">Agregar Aporte</button>

        <h3>➖ Registrar Gasto</h3>
        <input type="text" id="gasto-nombre" placeholder="¿En qué se gastó?">
        <input type="number" id="gasto-monto" placeholder="Monto $">
        <button class="btn-gasto" onclick="agregarRegistro('gasto')">Registrar Gasto</button>

        <hr>
        <button class="btn-wa" onclick="enviarWhatsApp('mes')">📲 Reporte del Mes (WhatsApp)</button>
        <button class="btn-total" onclick="enviarWhatsApp('total')">🌎 Reporte Anual (WhatsApp)</button>
        <button class="btn-print" onclick="prepararImpresion('mes')">🖨️ Imprimir Balance Mensual</button>
        <button class="btn-print" style="background-color: #37474f;" onclick="prepararImpresion('total')">📜 Imprimir Historial Completo</button>
        
        <button onclick="limpiarDatos()" style="background:none; color: grey; font-size: 11px; margin-top:10px;">Borrar todo el historial</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('cafeteria_vFinal')) || {};
    const selectMes = document.getElementById('mes-filtro');
    
    const ahora = new Date();
    for(let i = -6; i <= 6; i++) {
        let d = new Date(ahora.getFullYear(), ahora.getMonth() + i, 1);
        let valor = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        let opcion = document.createElement('option');
        opcion.value = valor;
        opcion.text = d.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
        if(i === 0) opcion.selected = true;
        selectMes.appendChild(opcion);
    }

    function asegurarMes(m) {
        if (!db[m]) db[m] = { ingresos: 0, gastos: 0, historial: [] };
    }

    function calcularAcumulado() {
        let totalI = 0, totalG = 0, todosLosMovimientos = [];
        Object.keys(db).sort().forEach(mesKey => {
            totalI += db[mesKey].ingresos;
            totalG += db[mesKey].gastos;
            db[mesKey].historial.forEach(mov => {
                todosLosMovimientos.push({ ...mov, mesLabel: mesKey });
            });
        });
        return { ingresos: totalI, gastos: totalG, saldo: totalI - totalG, historialCompleto: todosLosMovimientos };
    }

    function actualizarGraficos(ingresos, gastos, saldo) {
        document.getElementById('taza-ingresos').style.height = ingresos > 0 ? "100%" : "0%";
        let porcGasto = ingresos > 0 ? (gastos / ingresos) * 100 : 0;
        document.getElementById('taza-gastos').style.height = Math.min(porcGasto, 100) + "%";
        let porcSaldo = ingresos > 0 ? (saldo / ingresos) * 100 : 0;
        document.getElementById('taza-saldo').style.height = Math.max(0, Math.min(porcSaldo, 100)) + "%";
        
        document.getElementById('txt-ingresos').innerText = `$${ingresos.toLocaleString()}`;
        document.getElementById('txt-gastos').innerText = `$${gastos.toLocaleString()}`;
        document.getElementById('txt-saldo').innerText = `$${saldo.toLocaleString()}`;
    }

    function actualizarInterfaz() {
        let mesSel = selectMes.value;
        asegurarMes(mesSel);
        let datos = db[mesSel];
        let saldo = datos.ingresos - datos.gastos;
        
        document.getElementById('saldo-total').innerText = saldo.toLocaleString();
        document.getElementById('titulo-historial').innerText = `Movimientos: ${selectMes.options[selectMes.selectedIndex].text}`;
        
        actualizarGraficos(datos.ingresos, datos.gastos, saldo);

        const lista = document.getElementById('lista-movimientos');
        lista.innerHTML = datos.historial.map(m => `
            <div class="item-mov">
                <span><strong>${m.tipo === 'ingreso' ? '➕' : '➖'}</strong> ${m.nombre}</span>
                <span>$${m.monto.toLocaleString()}</span>
            </div>
        `).reverse().join('');
    }

    function prepararImpresion(modo) {
        const originalTitle = document.getElementById('titulo-historial').innerText;
        const originalSaldo = document.getElementById('saldo-total').innerText;
        const originalLista = document.getElementById('lista-movimientos').innerHTML;

        if (modo === 'total') {
            let ac = calcularAcumulado();
            document.getElementById('titulo-historial').innerText = `REPORTE MAESTRO - HISTORIAL COMPLETO`;
            document.getElementById('saldo-total').innerText = ac.saldo.toLocaleString();
            actualizarGraficos(ac.ingresos, ac.gastos, ac.saldo);
            
            document.getElementById('lista-movimientos').innerHTML = ac.historialCompleto.map(m => `
                <div class="item-mov">
                    <span><small class="fecha-mov">${m.mesLabel}</small> <strong>${m.tipo === 'ingreso' ? '➕' : '➖'}</strong> ${m.nombre}</span>
                    <span>$${m.monto.toLocaleString()}</span>
                </div>
            `).reverse().join('');
        }

        setTimeout(() => {
            window.print();
            // Restaurar
            document.getElementById('titulo-historial').innerText = originalTitle;
            document.getElementById('saldo-total').innerText = originalSaldo;
            document.getElementById('lista-movimientos').innerHTML = originalLista;
            actualizarInterfaz();
        }, 300);
    }

    function agregarRegistro(tipo) {
        let mesSel = selectMes.value;
        asegurarMes(mesSel);
        let nombre, monto, tel = "";

        if (tipo === 'ingreso') {
            nombre = document.getElementById('prof-nombre').value || "Anónimo";
            tel = document.getElementById('prof-tel').value || "";
            monto = parseFloat(document.getElementById('prof-monto').value);
        } else {
            nombre = document.getElementById('gasto-nombre').value || "Gasto vario";
            monto = parseFloat(document.getElementById('gasto-monto').value);
        }

        if (monto > 0) {
            if (tipo === 'ingreso') {
                db[mesSel].ingresos += monto;
                if(tel !== "" && confirm("¿Enviar recibo por WhatsApp?")) {
                    let msg = `✅ *Recibo Cafetería*\n${nombre}: Recibimos tu aporte de $${monto.toLocaleString()}. ¡Gracias!`;
                    window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
                }
            } else {
                db[mesSel].gastos += monto;
            }
            db[mesSel].historial.push({ tipo, nombre, monto, fecha: new Date().toLocaleDateString() });
            localStorage.setItem('cafeteria_vFinal', JSON.stringify(db));
            limpiarInputs();
            actualizarInterfaz();
        }
    }

    function enviarWhatsApp(modo) {
        let mensaje = "";
        if (modo === 'mes') {
            let mesNombre = selectMes.options[selectMes.selectedIndex].text;
            let d = db[selectMes.value];
            mensaje = `☕ *BALANCE CAFETERÍA - ${mesNombre.toUpperCase()}*\n➕ Ingresos: $${d.ingresos.toLocaleString()}\n➖ Gastos: $${d.gastos.toLocaleString()}\n💰 *Saldo Mes: $${(d.ingresos - d.gastos).toLocaleString()}*`;
        } else {
            let ac = calcularAcumulado();
            mensaje = `🌎 *BALANCE GLOBAL CAFETERÍA*\n💰 Ingresos Totales: $${ac.ingresos.toLocaleString()}\n💸 Gastos Totales: $${ac.gastos.toLocaleString()}\n💎 *SALDO ACTUAL: $${ac.saldo.toLocaleString()}*`;
        }
        window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`);
    }

    function limpiarInputs() {
        ['prof-nombre', 'prof-monto', 'prof-tel', 'gasto-nombre', 'gasto-monto'].forEach(id => document.getElementById(id).value = '');
    }

    function limpiarDatos() {
        if(confirm("Se borrará TODO el historial permanentemente. ¿Estás seguro?")) {
            localStorage.clear();
            location.reload();
        }
    }

    actualizarInterfaz();
</script>

</body>
</html>
